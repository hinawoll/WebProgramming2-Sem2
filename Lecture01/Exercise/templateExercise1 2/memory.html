  <body>
    <div class="container">
      <h1 class="text-center my-4">Memory Game</h1>
      <div id="game-board" class="row justify-content-center">
        <!-- Card elements will go here -->

        <!-- 1. Karte mit 🍎 -->
        <div
          class="card"
          onclick="
            //Wenn noch nicht zwei Karten aufgedeckt wurden
            // und diese Karte kein class 'flipped' hat, also noch nicht aufgedeckt wurde,
            //und diese Karte die class 'matched' nicht hat,
            if (
              !lock &&
              !this.classList.contains('flipped') &&
              !this.classList.contains('matched')
            ) {
              this.textContent = '🍎'; //'?' ändert sich zu Apfel
              this.classList.add('flipped');

              if (!firstCard) {
                //wenn noch keine Karte aufgedeckt wurde
                firstCard = this; //Diese Karte ist die erste Karte.
              } else {
                secondCard = this;
                lock = true; //Die alle Karten werden gesperrt.

                //wenn die erste und die zweite Karte die gleiche Inhalte haben,
                if (firstCard.textContent === secondCard.textContent) {
                  firstCard.classList.add('matched');
                  secondCard.classList.add('matched');

                  countPair += 1; // = ein Paar wurde aufgedeckt

                  //wenn zwei Paare aufgedecked wurden,
                  if (countPair === 2) {
                    //diese Nachricht wird ausgegeben
                    document.getElementById('compl-msg').textContent =
                      'Game Clear!';
                    //das restart-button wird sichtbar
                    document
                      .getElementById('restart-btn')
                      .classList.remove('invisible');
                  }

                  //die Variablen initialisieren
                  firstCard = null;
                  secondCard = null;
                  lock = false;
                } else {
                  setTimeout(
                    `
                    //die Karten und die Variablen nach einer Sekunde initialisieren
                    firstCard.textContent='?';
                    secondCard.textContent='?';
                    firstCard.classList.remove('flipped');
                    secondCard.classList.remove('flipped');
                    firstCard=null;
                    secondCard=null;
                    lock=false;`,
                    1000,
                  );
                }
              }
            }
          "
        >
          ?
        </div>

    <script>
